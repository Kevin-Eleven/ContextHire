# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/Kevin-Eleven/ContextHire"
sandbox_link: "https://contexthire.streamlit.app/"

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"
# Streams 100K profiles, ranks, writes submission.csv. Measured: 31s wall / 55 MB peak RSS,
# CPU-only, no network. The precomputed embedding artifacts in data/*.npy ship in the repo.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Linux box"
  cpu_cores: 12
  ram_gb: 16 # runs comfortably within 16 GB
  python_version: "3.12.3"
  os: "Ubuntu 24.04 LTS"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true # embeddings + BM25 precomputed offline (declared below)
  pre_computation_time_minutes: 8 # precompute_embeddings.py: ~8 min, CPU, BAAI/bge-small-en-v1.5

# What the precomputation does (transparency): precompute_embeddings.py embeds the top-12000
# candidates (by rubric) with BAAI/bge-small-en-v1.5 and computes BM25 over their career text vs the
# fixed JD, writing data/{embeddings,candidate_ids,jd_embedding,bm25}.npy (~9.6 MB, shipped in repo).
# rank.py loads those at ranking time — no model and no network are needed during ranking.
# calibrate.py (offline) measures the dataset constants the ranker's thresholds are tuned to.

