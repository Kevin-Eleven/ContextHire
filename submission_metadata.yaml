# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Explainable hybrid cascade. The skills[] array is treated as adversarial (the JD's stated trap),
  so ranking is driven by career_history titles/descriptions and summary, never by self-reported
  skills. Stages: (0) a conservative honeypot filter excludes internally-impossible profiles to avoid
  the >10% DQ; the positive fit score blends (A) semantic recall — BAAI/bge-small-en-v1.5 dense
  cosine + BM25 over career text vs the JD, precomputed offline — with (B) a JD rubric (role tier,
  retrieval/ranking evidence, 5-9y experience, pre-2022 ML, location) and (C) a skill-trust term that
  credits a claimed skill only when its name actually appears in the career text. Bounded penalty
  factors and a (D) behavioral availability multiplier (notice period, open-to-work, activity) then
  adjust the score. Every threshold is calibrated to the measured data distribution (calibrate.py).
  The top 100 get feature-driven reasoning that cites specific corroborated facts. Runs in ~31s for
  100K candidates on CPU, ~55 MB RAM, no network.

